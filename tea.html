<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea house</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
 
<!-- font awesome -->
 <script src="https://kit.fontawesome.com/bd634c992b.js" crossorigin="anonymous"></script>
</head>
<body>
   <!-- main content -->
    <main class="max-w-screen-lg  px-16 lg:px-20 ">
        <!-- header section -->
         <div class="flex  pt-20 mb-20 ">
            <!-- text-content --> 
             <div>
                <h1 class="text-5xl md:text-7xl">It's good <br> tea time at <br> The Tea House</h1>
                <br>
                <p class="text-gray-500 w-3/4">Tea and Botanical Solutions Supplier Give Optimum Satisfaction To Your Taste Buds.</p>
                <br>
                <button class="bg-gradient-to-r from-orange-500 via-red-500 text-white font-bold px-5 py-3 rounded-sm "> Explore me <i class="fa-solid fa-arrow-right -rotate-45"></i></button>

             </div>
             <!-- image conten -->
              <div class="relative">
                <div>
                    <img class="w-full" src="./images/banner.png" alt="">
                </div>
                <div class="absolute top-28 md:top-75 md:left-32 flex items-center bg-white shadow-lg p-2 md:px-10 lg:py-4">
                    <div><i class="fa-solid fa-star text-2xl text-amber-500"></i></div>
                    <div class="ml-2 font-bold">
                        <h1 class="lg:text-3xl">5.00</h1>
                        <p class="text-gray-500">Trust Pilot Ratings</p>
                    </div>
                </div>

              </div>

         </div>

    </main>
</body>
</html>
